name: Editorial Daily Task

on:
  schedule:
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-daily-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync pipeline state from handoff files
        run: python automation/pipeline/scripts/sync_state.py

      - name: Publish from final on publish days
        run: python automation/pipeline/scripts/publish_from_final.py

      - name: Generate daily editorial task
        run: python automation/pipeline/scripts/generate_daily_task.py

      - name: Commit and push if changed
        run: |
          git config user.name "cranycrane-openclaw"
          git config user.email "openclaw@jakub-jerabek.cz"
          git add automation/pipeline/daily/*.md automation/pipeline/state.json _posts/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "automation: run daily editorial orchestration"
          git push
